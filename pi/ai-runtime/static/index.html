<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Vritti</title>
  <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png" />
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-panel: #12121a;
      --bg-card: #1a1a24;
      --saffron: #e87924;
      --saffron-light: #f59e0b;
      --saffron-grad: linear-gradient(135deg, var(--saffron), var(--saffron-light));
      --text-main: #f5f5f5;
      --text-muted: #a1a1aa;
      --border: rgba(232, 121, 36, 0.15);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', 'Segoe UI', system-ui, -apple-system, sans-serif; }
    
    body, html {
      background: var(--bg);
      color: var(--text-main);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* WhatsApp/Telegram chat background pattern (subtle) */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: radial-gradient(var(--saffron) 1px, transparent 1px);
      background-size: 20px 20px;
      z-index: -1;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      padding: 0.75rem 1.25rem;
      background: rgba(18, 18, 26, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.85rem;
      flex-shrink: 0;
      z-index: 10;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .header .logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid var(--saffron);
      padding: 2px;
    }
    .header-text {
      flex: 1;
    }
    .header-text h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: 0.01em;
      margin-bottom: 2px;
    }
    .header-text .sub {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .header .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }

    /* ── Messages ───────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }

    .welcome {
      text-align: center;
      padding: 2rem 1rem;
      margin: auto;
      background: rgba(26, 26, 36, 0.4);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 1.5rem;
      backdrop-filter: blur(8px);
      max-width: 320px;
    }
    .welcome .brand {
      font-size: 2.2rem;
      font-weight: 800;
      background: var(--saffron-grad);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .welcome p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1.2rem; }
    .welcome .langs {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .welcome .lang-tag {
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      background: rgba(232, 121, 36, 0.1);
      border: 1px solid rgba(232, 121, 36, 0.2);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--saffron-light);
    }

    .msg { 
      max-width: 85%; 
      display: flex; 
      flex-direction: column; 
      animation: fadeInBottom 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; 
      opacity: 0;
      transform: translateY(10px);
    }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    @keyframes fadeInBottom {
      to { opacity: 1; transform: translateY(0); }
    }

    .msg .bubble {
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .msg.user .bubble {
      background: var(--saffron-grad);
      color: #fff;
      border-radius: 1.25rem 0.25rem 1.25rem 1.25rem;
    }
    .msg.assistant .bubble {
      background: var(--bg-card);
      color: var(--text-main);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 0.25rem 1.25rem 1.25rem 1.25rem;
    }

    /* Chat Tails */
    .msg.user .bubble::after {
      content: '';
      position: absolute;
      top: 0;
      right: -8px;
      width: 16px;
      height: 16px;
      background: var(--saffron-light); /* Approximate right side of gradient */
      clip-path: polygon(0 0, 0 100%, 100% 0);
      border-radius: 0 4px 0 0;
    }
    .msg.assistant .bubble::after {
      content: '';
      position: absolute;
      top: 0;
      left: -8px;
      width: 16px;
      height: 16px;
      background: var(--bg-card);
      clip-path: polygon(100% 0, 0 0, 100% 100%);
      border-radius: 4px 0 0 0;
      border-top: 1px solid rgba(255,255,255,0.05);
      border-left: 1px solid rgba(255,255,255,0.05);
    }

    .msg .meta {
      display: flex;
      gap: 0.5rem;
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
      padding: 0 0.25rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Typing indicator ───────────────────────────── */
    .typing { align-self: flex-start; }
    .typing .bubble {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 0.25rem 1.25rem 1.25rem 1.25rem;
      padding: 0.85rem 1.25rem;
      display: flex;
      gap: 5px;
      align-items: center;
      min-height: 40px;
    }
    .typing .bubble::after {
      background: var(--bg-card);
    }
    .typing .bubble span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--saffron);
      animation: typingBounce 1.4s infinite ease-in-out both;
    }
    .typing .bubble span:nth-child(1) { animation-delay: -0.32s; }
    .typing .bubble span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typingBounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Input area ─────────────────────────────────── */
    .input-wrapper {
      background: rgba(18, 18, 26, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem 1rem;
      flex-shrink: 0;
      z-index: 10;
    }
    
    .status {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .input-area {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.5rem;
      padding: 0.4rem 0.4rem 0.4rem 1.2rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-area:focus-within {
      border-color: var(--saffron);
      box-shadow: 0 0 0 2px rgba(232, 121, 36, 0.15);
    }

    .input-area textarea {
      flex: 1;
      min-height: 24px;
      max-height: 120px;
      padding: 0.6rem 0;
      background: transparent;
      border: none;
      color: var(--text-main);
      font: inherit;
      font-size: 0.95rem;
      resize: none;
      line-height: 1.4;
    }
    .input-area textarea::placeholder { color: #71717a; }
    .input-area textarea:focus { outline: none; }
    
    .input-area button {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: var(--saffron-grad);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
      box-shadow: 0 4px 10px rgba(232, 121, 36, 0.3);
    }
    .input-area button:hover:not(:disabled) { 
      transform: scale(1.05); 
      box-shadow: 0 6px 14px rgba(232, 121, 36, 0.4);
    }
    .input-area button:active:not(:disabled) { transform: scale(0.95); }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; background: #3f3f46; }
    .input-area button svg { width: 18px; height: 18px; position: relative; left: -1px; }

  </style>
</head>
<body>
  <header class="header">
    <img src="/vritti-symbol.png" alt="Vritti" class="logo" />
    <div class="header-text">
      <h1>Vritti</h1>
      <div class="sub">AI for every Indian language</div>
    </div>
    <div class="dot" id="statusDot" title="Online"></div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome">
      <div class="brand">Vritti</div>
      <p>Ask me anything in your language.<br/>I'm here to help.</p>
      <div class="langs">
        <span class="lang-tag">Eng</span>
        <span class="lang-tag">हिन्दी</span>
        <span class="lang-tag">Hinglish</span>
      </div>
    </div>
  </div>

  <div class="input-wrapper">
    <div class="status" id="status">Ready</div>
    <div class="input-area">
      <textarea id="prompt" placeholder="Message Vritti..." rows="1"></textarea>
      <button type="button" id="send" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const statusDot = document.getElementById('statusDot');
    let welcomeShown = true;

    function setStatus(s) { statusEl.textContent = s; }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'msg typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<div class="bubble"><span></span><span></span><span></span></div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function addMessage(role, text, meta) {
      if (welcomeShown) {
        const w = messagesEl.querySelector('.welcome');
        if (w) w.remove();
        welcomeShown = false;
      }
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      let metaHtml = '';
      if (meta && (meta.source || meta.api_polished !== undefined)) {
        metaHtml = '<div class="meta">';
        if (meta.source) metaHtml += '<span>' + (meta.source === 'gateway' ? '⚡ gateway' : meta.source === 'local' ? '📡 local model' : meta.source) + '</span>';
        metaHtml += '</div>';
      }
      div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>' + metaHtml;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(s) {
      const p = document.createElement('p');
      p.textContent = s;
      return p.innerHTML;
    }

    // Auto-resize textarea
    promptEl.addEventListener('input', () => {
      promptEl.style.height = 'auto';
      promptEl.style.height = Math.min(promptEl.scrollHeight, 120) + 'px';
    });

    async function send() {
      const prompt = promptEl.value.trim();
      if (!prompt) return;
      promptEl.value = '';
      promptEl.style.height = 'auto';
      addMessage('user', prompt);
      sendBtn.disabled = true;
      setStatus('Thinking...');
      showTyping();

      try {
        const res = await fetch('/v1/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });
        hideTyping();
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          addMessage('assistant', 'Error: ' + (data.detail || res.statusText), null);
          setStatus('Error');
          return;
        }
        const answer = data.answer || (data.reason ? data.reason : '(no response)');
        addMessage('assistant', answer, {
          source: data.source,
          api_polished: data.api_polished,
        });
        setStatus('Ready');
      } catch (e) {
        hideTyping();
        addMessage('assistant', 'Network error: ' + e.message, null);
        setStatus('Connection lost');
        statusDot.style.background = '#ef4444';
        statusDot.style.boxShadow = '0 0 8px rgba(239,68,68,0.5)';
      } finally {
        sendBtn.disabled = false;
        promptEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    promptEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { 
        // Mobile simple submit fix
        e.preventDefault(); 
        send(); 
      }
    });

    // Health check — update status dot
    async function checkHealth() {
      try {
        const res = await fetch('/health');
        const data = await res.json();
        if (data.status === 'ok') {
          statusDot.style.background = '#22c55e';
          statusDot.style.boxShadow = '0 0 8px rgba(34,197,94,0.5)';
          statusDot.title = 'Online — backend reachable';
        } else {
          statusDot.style.background = '#f59e0b';
          statusDot.style.boxShadow = '0 0 8px rgba(245,158,11,0.5)';
          statusDot.title = 'Local model offline — using API';
        }
      } catch {
        statusDot.style.background = '#ef4444';
        statusDot.style.boxShadow = '0 0 8px rgba(239,68,68,0.5)';
        statusDot.title = 'Offline';
      }
    }
    checkHealth();
    setInterval(checkHealth, 30000);
  </script>
</body>
</html>
