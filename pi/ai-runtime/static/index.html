<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vritti</title>
  <link rel="icon" href="/vritti-symbol.png" type="image/png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e4e4e7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, #1a1a24 0%, #12121a 100%);
      border-bottom: 1px solid rgba(232, 121, 36, 0.15);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .header .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid rgba(232, 121, 36, 0.3);
      padding: 2px;
    }
    .header-text h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f5f5f5;
      letter-spacing: 0.02em;
    }
    .header-text .sub {
      font-size: 0.72rem;
      color: #71717a;
      letter-spacing: 0.04em;
    }
    .header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-left: auto;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.4);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── Messages ───────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }

    .welcome {
      text-align: center;
      padding: 3rem 1rem;
      color: #52525b;
    }
    .welcome .brand {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e87924, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .welcome p { font-size: 0.85rem; line-height: 1.6; }
    .welcome .langs {
      margin-top: 1rem;
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .welcome .lang-tag {
      padding: 0.3rem 0.75rem;
      border-radius: 2rem;
      background: #1a1a24;
      border: 1px solid #27272a;
      font-size: 0.75rem;
      color: #a1a1aa;
    }

    .msg { max-width: 80%; animation: fadeIn 0.25s ease-out; }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg .bubble {
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, #e87924, #d96b18);
      color: #fff;
      border-radius: 1.25rem 1.25rem 0.35rem 1.25rem;
    }
    .msg.assistant .bubble {
      background: #1a1a24;
      color: #e4e4e7;
      border: 1px solid #27272a;
      border-radius: 1.25rem 1.25rem 1.25rem 0.35rem;
    }

    .msg .meta {
      display: flex;
      gap: 0.75rem;
      font-size: 0.65rem;
      color: #52525b;
      margin-top: 0.35rem;
      padding: 0 0.25rem;
    }
    .msg.user .meta { justify-content: flex-end; }

    /* ── Typing indicator ───────────────────────────── */
    .typing { align-self: flex-start; }
    .typing .bubble {
      background: #1a1a24;
      border: 1px solid #27272a;
      border-radius: 1.25rem;
      padding: 0.85rem 1.25rem;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .typing .bubble span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #e87924;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing .bubble span:nth-child(2) { animation-delay: 0.15s; }
    .typing .bubble span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input area ─────────────────────────────────── */
    .input-area {
      padding: 1rem 1.5rem 1.25rem;
      background: #0f0f15;
      border-top: 1px solid rgba(232, 121, 36, 0.1);
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1;
      min-height: 46px;
      max-height: 140px;
      padding: 0.7rem 1rem;
      border: 1px solid #27272a;
      border-radius: 1rem;
      background: #1a1a24;
      color: #e4e4e7;
      font: inherit;
      font-size: 0.9rem;
      resize: none;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    .input-area textarea::placeholder { color: #52525b; }
    .input-area textarea:focus {
      outline: none;
      border-color: #e87924;
      box-shadow: 0 0 0 2px rgba(232, 121, 36, 0.1);
    }
    .input-area button {
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #e87924, #d96b18);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.2s;
      flex-shrink: 0;
    }
    .input-area button:hover { transform: scale(1.05); }
    .input-area button:active { transform: scale(0.95); }
    .input-area button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .input-area button svg { width: 20px; height: 20px; }

    /* ── Status bar ──────────────────────────────────── */
    .status {
      font-size: 0.68rem;
      color: #3f3f46;
      padding: 0 1.5rem 0.5rem;
      flex-shrink: 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <header class="header">
    <img src="/vritti-symbol.png" alt="Vritti" class="logo" />
    <div class="header-text">
      <h1>Vritti</h1>
      <div class="sub">AI for every Indian language</div>
    </div>
    <div class="dot" id="statusDot" title="Online"></div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome">
      <div class="brand">Vritti</div>
      <p>Ask me anything in your language.</p>
      <div class="langs">
        <span class="lang-tag">English</span>
        <span class="lang-tag">Hindi</span>
        <span class="lang-tag">Hinglish</span>
      </div>
    </div>
  </div>

  <div class="status" id="status">Ready</div>

  <div class="input-area">
    <textarea id="prompt" placeholder="Type your message..." rows="1"></textarea>
    <button type="button" id="send" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13" />
        <polygon points="22 2 15 22 11 13 2 9 22 2" />
      </svg>
    </button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const statusDot = document.getElementById('statusDot');
    let welcomeShown = true;

    function setStatus(s) { statusEl.textContent = s; }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'msg typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<div class="bubble"><span></span><span></span><span></span></div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function addMessage(role, text, meta) {
      if (welcomeShown) {
        const w = messagesEl.querySelector('.welcome');
        if (w) w.remove();
        welcomeShown = false;
      }
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      let metaHtml = '';
      if (meta && (meta.source || meta.api_polished !== undefined)) {
        metaHtml = '<div class="meta">';
        if (meta.source) metaHtml += '<span>' + (meta.source === 'gateway' ? 'polished via API' : meta.source === 'local' ? 'local model' : meta.source) + '</span>';
        metaHtml += '</div>';
      }
      div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>' + metaHtml;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(s) {
      const p = document.createElement('p');
      p.textContent = s;
      return p.innerHTML;
    }

    // Auto-resize textarea
    promptEl.addEventListener('input', () => {
      promptEl.style.height = 'auto';
      promptEl.style.height = Math.min(promptEl.scrollHeight, 140) + 'px';
    });

    async function send() {
      const prompt = promptEl.value.trim();
      if (!prompt) return;
      promptEl.value = '';
      promptEl.style.height = 'auto';
      addMessage('user', prompt);
      sendBtn.disabled = true;
      setStatus('Thinking...');
      showTyping();

      try {
        const res = await fetch('/v1/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });
        hideTyping();
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          addMessage('assistant', 'Error: ' + (data.detail || res.statusText), null);
          setStatus('Error');
          return;
        }
        const answer = data.answer || (data.reason ? data.reason : '(no response)');
        addMessage('assistant', answer, {
          source: data.source,
          api_polished: data.api_polished,
        });
        setStatus('Ready');
      } catch (e) {
        hideTyping();
        addMessage('assistant', 'Network error: ' + e.message, null);
        setStatus('Connection lost');
        statusDot.style.background = '#ef4444';
        statusDot.style.boxShadow = '0 0 6px rgba(239,68,68,0.4)';
      } finally {
        sendBtn.disabled = false;
        promptEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    promptEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    // Health check — update status dot
    async function checkHealth() {
      try {
        const res = await fetch('/health');
        const data = await res.json();
        if (data.status === 'ok') {
          statusDot.style.background = '#22c55e';
          statusDot.style.boxShadow = '0 0 6px rgba(34,197,94,0.4)';
          statusDot.title = 'Online — backend reachable';
        } else {
          statusDot.style.background = '#f59e0b';
          statusDot.style.boxShadow = '0 0 6px rgba(245,158,11,0.4)';
          statusDot.title = 'Local model offline — using API';
        }
      } catch {
        statusDot.style.background = '#ef4444';
        statusDot.style.boxShadow = '0 0 6px rgba(239,68,68,0.4)';
        statusDot.title = 'Offline';
      }
    }
    checkHealth();
    setInterval(checkHealth, 30000);
  </script>
</body>
</html>
