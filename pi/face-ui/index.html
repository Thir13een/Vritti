<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Vritti</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
button { font: inherit; border: 0; background: none; color: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }

:root {
  --bg-0: #040506;
  --bg-1: #0d1111;
  --bg-2: #141612;
  --cream: #f1e7d3;
  --mist: rgba(241, 231, 211, 0.68);
  --mist-soft: rgba(241, 231, 211, 0.46);
  --glass-line: rgba(255, 248, 232, 0.12);
  --gold: #d5b377;
  --brass: #b8935e;
  --jade: #2d5c52;
  --sage: #7e9889;
  --wine: #8e5d5b;
  --ink: rgba(7, 9, 11, 0.7);
  --sky-a: rgba(213, 179, 119, 0.1);
  --sky-b: rgba(45, 92, 82, 0.08);
  --sky-c: rgba(126, 152, 137, 0.06);
  --aura-a: rgba(213, 179, 119, 0.08);
  --aura-b: rgba(45, 92, 82, 0.06);
  --ambient-top: rgba(255,255,255,0.04);
  --ambient-gold: rgba(213, 179, 119, 0.08);
  --ambient-line: rgba(255,255,255,0.02);
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 18%, var(--sky-a), transparent 24%),
    radial-gradient(circle at 20% 62%, var(--sky-b), transparent 26%),
    radial-gradient(circle at 80% 34%, var(--sky-c), transparent 28%),
    linear-gradient(180deg, #030404 0%, var(--bg-0) 18%, var(--bg-1) 58%, var(--bg-2) 100%);
  color: var(--cream);
  user-select: none;
  touch-action: manipulation;
  overscroll-behavior: none;
  font-family: "Optima", "Candara", "Segoe UI", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 54%, var(--aura-a), transparent 20%),
    radial-gradient(circle at 50% 54%, var(--aura-b), transparent 34%);
  opacity: 1;
  mix-blend-mode: screen;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  opacity: 0.08;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.25'/%3E%3C/svg%3E");
  mix-blend-mode: soft-light;
}

#ambient {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  opacity: 1;
  background:
    linear-gradient(180deg, var(--ambient-top), transparent 18%),
    radial-gradient(circle at 50% 0%, var(--ambient-gold), transparent 34%),
    radial-gradient(circle at 50% 52%, var(--aura-a), transparent 24%),
    radial-gradient(circle at 50% 52%, var(--aura-b), transparent 42%),
    linear-gradient(90deg, transparent 0%, var(--ambient-line) 50%, transparent 100%);
  mix-blend-mode: screen;
}

canvas#c {
  position: fixed;
  inset: 0;
  z-index: 0;
  width: 100%;
  height: 100%;
}

#shell {
  position: fixed;
  inset: 0;
  z-index: 4;
  pointer-events: none;
}

.glass {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.03) 28%, rgba(15, 19, 19, 0.22) 100%),
    linear-gradient(180deg, rgba(16, 18, 20, 0.58), rgba(8, 10, 11, 0.4));
  border: 1px solid var(--glass-line);
  backdrop-filter: blur(14px) saturate(1.08);
  -webkit-backdrop-filter: blur(14px) saturate(1.08);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.1),
    inset 0 -1px 0 rgba(255,255,255,0.03),
    0 18px 48px rgba(0,0,0,0.24);
}

#modeBtn .kicker {
  font-size: 10px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: rgba(241, 231, 211, 0.42);
  font-family: "Avenir Next", "Segoe UI Variable", "Segoe UI", sans-serif;
  font-weight: 600;
}

#modeBtn {
  width: auto;
  min-width: 108px;
  min-height: 50px;
  padding: 11px 18px 12px;
  border-radius: 999px;
  text-align: center;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03) 34%, rgba(8, 10, 11, 0.1) 100%),
    linear-gradient(180deg, rgba(22, 24, 27, 0.84), rgba(11, 13, 15, 0.9));
  border: 1px solid rgba(242, 231, 208, 0.13);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -1px 0 rgba(0,0,0,0.14),
    0 10px 24px rgba(0,0,0,0.22),
    0 0 0 1px rgba(255,255,255,0.02);
  backdrop-filter: blur(8px) saturate(1.02);
  -webkit-backdrop-filter: blur(8px) saturate(1.02);
}

#modeBtn {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03) 34%, rgba(8, 10, 11, 0.08) 100%),
    linear-gradient(180deg, rgba(28, 24, 19, 0.86), rgba(15, 13, 11, 0.92));
  border-color: rgba(213, 179, 119, 0.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -1px 0 rgba(0,0,0,0.16),
    0 10px 24px rgba(0,0,0,0.22),
    0 8px 18px rgba(213, 179, 119, 0.08);
}

#modeLabel {
  font-size: 0.86rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  line-height: 1;
  font-family: "Avenir Next Condensed", "Segoe UI Variable", "Segoe UI", sans-serif;
}

#centerCopy {
  position: fixed;
  left: 50%;
  top: clamp(70px, 11vh, 108px);
  transform: translateX(-50%);
  width: min(76vw, 880px);
  text-align: center;
  pointer-events: none;
}

#stateWord {
  font-size: clamp(4rem, 10.5vw, 7.2rem);
  line-height: 0.9;
  letter-spacing: -0.045em;
  font-weight: 600;
  text-transform: uppercase;
  text-shadow: 0 12px 42px rgba(0, 0, 0, 0.32);
  font-family: "Baskerville", "Iowan Old Style", "Palatino Linotype", Georgia, serif;
}

#statusLine {
  min-height: 1.35em;
  margin-top: 12px;
  font-size: clamp(0.8rem, 1.5vw, 0.95rem);
  line-height: 1.35;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--mist-soft);
  font-family: "Avenir Next", "Segoe UI Variable", "Segoe UI", sans-serif;
}

#statusLine:empty {
  margin-top: 0;
}

#bottom {
  position: fixed;
  left: 50%;
  bottom: clamp(28px, 5vh, 48px);
  transform: translateX(-50%);
  pointer-events: none;
}

#bottomRail {
  position: relative;
  display: grid;
  grid-template-columns: auto auto auto;
  align-items: center;
  gap: clamp(12px, 1.6vw, 18px);
}

#modeBtn,
#micWrap,
#stopBtn {
  pointer-events: auto;
}

#micWrap {
  position: relative;
  width: 108px;
  height: 108px;
  display: grid;
  place-items: center;
}

#micWrap .level-ring {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
  pointer-events: none;
}

#micWrap .track {
  fill: none;
  stroke: rgba(255,255,255,0.06);
  stroke-width: 2;
}

#micWrap .level {
  fill: none;
  stroke: url(#ringGrad);
  stroke-width: 2.2;
  stroke-linecap: round;
  stroke-dasharray: 427;
  stroke-dashoffset: 427;
  transition: stroke-dashoffset 0.1s ease;
}

#micBtn {
  width: 78px;
  height: 78px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at 34% 28%, rgba(255,255,255,0.16), transparent 32%),
    radial-gradient(circle at 50% 100%, rgba(213, 179, 119, 0.12), transparent 44%),
    linear-gradient(180deg, rgba(27, 30, 31, 0.98), rgba(11, 13, 14, 1));
  border: 1px solid rgba(213, 179, 119, 0.42);
  box-shadow:
    0 12px 24px rgba(0,0,0,0.26),
    0 8px 20px rgba(213, 179, 119, 0.08),
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -10px 16px rgba(0,0,0,0.22);
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
}

#micBtn svg {
  width: 26px;
  height: 26px;
  fill: rgba(241, 231, 211, 0.92);
}

#micBtn:active { transform: scale(0.97); }
#micBtn.active {
  border-color: rgba(213, 179, 119, 0.8);
  box-shadow:
    0 0 0 1px rgba(213, 179, 119, 0.22),
    0 0 24px rgba(213, 179, 119, 0.12),
    0 14px 28px rgba(0,0,0,0.28),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

#micWrap.disabled .track {
  stroke: rgba(185, 129, 123, 0.12);
}

#micWrap.disabled .level {
  stroke: rgba(185, 129, 123, 0.42);
  stroke-dashoffset: 256;
}

#micBtn:disabled {
  cursor: default;
  opacity: 0.62;
  border-color: rgba(185, 129, 123, 0.34);
  box-shadow:
    0 8px 16px rgba(0,0,0,0.2),
    inset 0 1px 0 rgba(255,255,255,0.05),
    inset 0 -8px 14px rgba(0,0,0,0.18);
}

#stopBtn {
  min-width: 84px;
  min-height: 50px;
  padding: 11px 16px 12px;
  border-radius: 999px;
  text-align: center;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03) 34%, rgba(8, 10, 11, 0.1) 100%),
    linear-gradient(180deg, rgba(33, 24, 24, 0.86), rgba(18, 12, 12, 0.92));
  border: 1px solid rgba(185, 129, 123, 0.28);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    inset 0 -1px 0 rgba(0,0,0,0.16),
    0 10px 24px rgba(0,0,0,0.22);
  color: rgba(241, 231, 211, 0.92);
}

#stopBtn[hidden] {
  display: none;
}

#stopBtn .kicker {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(241, 231, 211, 0.42);
  font-family: "Avenir Next", "Segoe UI Variable", "Segoe UI", sans-serif;
  font-weight: 600;
}

#stopLabel {
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  line-height: 1;
  font-family: "Avenir Next Condensed", "Segoe UI Variable", "Segoe UI", sans-serif;
}

body[data-face="idle"] #stateWord { color: var(--cream); }
body[data-face="listening"] #stateWord { color: #d8bc88; }
body[data-face="thinking"] #stateWord { color: #a7baae; }
body[data-face="speaking"] #stateWord { color: #e0b77d; }
body[data-face="error"] #stateWord { color: #b9817b; }

@media (hover: hover) and (pointer: fine) {
  #micBtn:hover {
    transform: translateY(-1px);
    border-color: rgba(213, 179, 119, 0.54);
  }
}

@media (max-width: 980px) {
  #centerCopy {
    width: min(88vw, 740px);
  }
}

@media (max-width: 640px) {
  #centerCopy {
    top: max(66px, env(safe-area-inset-top));
    width: calc(100vw - 28px);
  }

  #stateWord {
    font-size: clamp(3.6rem, 18vw, 5.8rem);
  }

  #bottom {
    bottom: max(16px, env(safe-area-inset-bottom));
  }

  #bottomRail {
    gap: 10px;
  }

  #modeBtn {
    width: auto;
    min-width: 88px;
    min-height: 44px;
    padding: 10px 13px;
    border-radius: 999px;
  }

  #stopBtn {
    min-width: 74px;
    min-height: 44px;
    padding: 10px 13px;
  }

  #micWrap {
    width: 94px;
    height: 94px;
  }

  #micWrap .level-ring {
    inset: 2px;
    width: calc(100% - 4px);
    height: calc(100% - 4px);
  }

  #micBtn {
    width: 66px;
    height: 66px;
  }
}

@media (max-height: 760px) {
  #centerCopy {
    top: 70px;
  }

  #micWrap {
    width: 96px;
    height: 96px;
  }

  #micBtn {
    width: 66px;
    height: 66px;
  }

  #bottom {
    bottom: max(14px, env(safe-area-inset-bottom));
  }
}

@media (max-width: 520px) {
  #modeLabel {
    font-size: 0.78rem;
  }

  #modeBtn .kicker {
    font-size: 9px;
    letter-spacing: 0.18em;
  }
}

@media (max-width: 430px) {
  #centerCopy {
    top: max(58px, env(safe-area-inset-top));
  }

  #stateWord {
    font-size: clamp(3.2rem, 16vw, 4.8rem);
  }

  #bottomRail {
    grid-template-columns: auto auto auto;
    grid-template-areas: "mic stop mode";
    justify-items: center;
    column-gap: 10px;
  }

  #modeBtn {
    grid-area: mode;
  }

  #stopBtn {
    grid-area: stop;
  }

  #micWrap {
    grid-area: mic;
    width: 92px;
    height: 92px;
  }

  #micBtn {
    width: 64px;
    height: 64px;
  }
}

@media (max-height: 620px) {
  #centerCopy {
    top: 56px;
  }

  #bottom {
    bottom: 10px;
  }

  #bottomRail {
    gap: 10px;
  }
}
</style>
</head>
<body data-face="idle">
<div id="ambient" aria-hidden="true"></div>
<canvas id="c"></canvas>

<div id="shell">
  <div id="centerCopy">
    <div id="stateWord">Still</div>
    <div id="statusLine" aria-live="polite"></div>
  </div>

  <div id="bottom">
    <div id="bottomRail">
      <div id="micWrap">
        <svg class="level-ring" viewBox="0 0 158 158" aria-hidden="true">
          <defs>
              <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#8e5d5b"></stop>
              <stop offset="48%" stop-color="#d5b377"></stop>
              <stop offset="100%" stop-color="#2d5c52"></stop>
            </linearGradient>
          </defs>
          <circle class="track" cx="79" cy="79" r="68"></circle>
          <circle class="level" id="micLevelArc" cx="79" cy="79" r="68"></circle>
        </svg>
        <button type="button" id="micBtn" aria-label="Microphone toggle">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"></path></svg>
        </button>
      </div>

      <button type="button" id="stopBtn" class="glass" aria-label="Stop current operation" hidden>
        <div class="kicker">Now</div>
        <div id="stopLabel">Stop</div>
      </button>

      <button type="button" id="modeBtn" class="glass" aria-label="Switch response mode">
        <div class="kicker">Mode</div>
        <div id="modeLabel">Fast</div>
      </button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const modeBtn = document.getElementById('modeBtn');
const modeLabel = document.getElementById('modeLabel');
const stopBtn = document.getElementById('stopBtn');
const stateWord = document.getElementById('stateWord');
const statusLine = document.getElementById('statusLine');
const micWrap = document.getElementById('micWrap');
const micLevelArc = document.getElementById('micLevelArc');
const TAU = Math.PI * 2;
const RING_LEN = 2 * Math.PI * 68;
const CONVERSATION_KEY = 'vritti-conversation-state';
const CONVERSATION_IDLE_MS = 30 * 60 * 1000;
const STATE_POLL_MS = 1000;
const HEALTH_POLL_MS = 5000;

const STATUS_COPY = {
  idle: {
    word: 'Still',
    mic: 'Tap to speak.',
  },
  listening: {
    word: 'Attentive',
    mic: 'Listening.',
  },
  thinking: {
    word: 'Composing',
    mic: 'Thinking.',
  },
  speaking: {
    word: 'Expressing',
    mic: 'Tap stop to cancel.',
  },
  error: {
    word: 'Offline',
    mic: 'Retry.',
  },
};

const MODE_COPY = {
  fast: 'Fast',
  deep: 'Deep',
};

const DAYPARTS = {
  morning: {
    skyA: 'rgba(229, 188, 126, 0.18)',
    skyB: 'rgba(155, 174, 141, 0.09)',
    skyC: 'rgba(243, 218, 181, 0.05)',
    auraA: 'rgba(236, 192, 126, 0.12)',
    auraB: 'rgba(129, 160, 128, 0.08)',
    ambientTop: 'rgba(255,244,224,0.06)',
    ambientGold: 'rgba(236, 192, 126, 0.12)',
    ambientLine: 'rgba(255,248,236,0.022)',
    glowA: [232, 188, 120],
    glowB: [152, 176, 138],
  },
  afternoon: {
    skyA: 'rgba(212, 177, 120, 0.12)',
    skyB: 'rgba(76, 110, 100, 0.08)',
    skyC: 'rgba(156, 176, 170, 0.05)',
    auraA: 'rgba(212, 177, 120, 0.1)',
    auraB: 'rgba(76, 110, 100, 0.07)',
    ambientTop: 'rgba(255,255,255,0.04)',
    ambientGold: 'rgba(212, 177, 120, 0.09)',
    ambientLine: 'rgba(255,255,255,0.02)',
    glowA: [212, 177, 120],
    glowB: [78, 118, 106],
  },
  night: {
    skyA: 'rgba(88, 111, 155, 0.12)',
    skyB: 'rgba(58, 90, 125, 0.08)',
    skyC: 'rgba(147, 122, 170, 0.05)',
    auraA: 'rgba(106, 125, 176, 0.11)',
    auraB: 'rgba(77, 108, 152, 0.08)',
    ambientTop: 'rgba(210,220,255,0.03)',
    ambientGold: 'rgba(107, 128, 184, 0.08)',
    ambientLine: 'rgba(225,232,255,0.02)',
    glowA: [110, 132, 186],
    glowB: [96, 113, 168],
  },
};

const LOTUS_PALETTES = {
  idle: { bg: [5, 6, 7], a: [213, 179, 119], b: [45, 92, 82], c: [241, 231, 211] },
  listening: { bg: [6, 7, 8], a: [222, 193, 136], b: [82, 126, 112], c: [241, 231, 211] },
  thinking: { bg: [5, 7, 8], a: [126, 152, 137], b: [180, 188, 176], c: [241, 231, 211] },
  speaking: { bg: [7, 6, 7], a: [224, 183, 125], b: [142, 93, 91], c: [241, 231, 211] },
  error: { bg: [9, 6, 7], a: [185, 129, 123], b: [184, 147, 94], c: [241, 231, 211] },
};

let W = 0;
let H = 0;
let cx = 0;
let cy = 0;
let lastTime = 0;
let t = 0;
let state = 'idle';
let currentMode = 'fast';
let amp = 0;
let ampTarget = 0;
let transBlend = 1;
let transDuration = 1;
let errorTimer = 0;
let perfScale = 1;
let dayPart = '';

function lerp(a, b, n) { return a + (b - a) * n; }
function clamp01(v) { return Math.max(0, Math.min(1, v)); }
function easeOut(v) { return 1 - Math.pow(1 - v, 3); }
function rgba(c, a) { return 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + Math.max(0, Math.min(1, a)) + ')'; }
function mix(a, b, n) { return [lerp(a[0], b[0], n), lerp(a[1], b[1], n), lerp(a[2], b[2], n)]; }
function pal() { return LOTUS_PALETTES[state] || LOTUS_PALETTES.idle; }
function dayPal() { return DAYPARTS[dayPart] || DAYPARTS.afternoon; }
function createConversationId() { return 'kiosk-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now().toString(36); }
function readConversationState() {
  try {
    const raw = localStorage.getItem(CONVERSATION_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object') return null;
    if (!parsed.id || typeof parsed.id !== 'string') return null;
    return parsed;
  } catch {
    return null;
  }
}

function persistConversationState(state) {
  try { localStorage.setItem(CONVERSATION_KEY, JSON.stringify(state)); } catch {}
  return state;
}

function ensureConversationState(forceNew) {
  const now = Date.now();
  const existing = readConversationState();
  if (!forceNew && existing && now - Number(existing.lastActiveAt || 0) < CONVERSATION_IDLE_MS) {
    existing.lastActiveAt = now;
    return persistConversationState(existing);
  }
  return persistConversationState({ id: createConversationId(), lastActiveAt: now });
}

function touchConversation() {
  return ensureConversationState(false).id;
}

function getDayPartForHour(hour) {
  if (hour >= 5 && hour < 12) return 'morning';
  if (hour >= 12 && hour < 18) return 'afternoon';
  return 'night';
}

function applyDayPart(name) {
  if (!DAYPARTS[name] || name === dayPart) return;
  dayPart = name;
  const p = DAYPARTS[name];
  const root = document.documentElement.style;
  root.setProperty('--sky-a', p.skyA);
  root.setProperty('--sky-b', p.skyB);
  root.setProperty('--sky-c', p.skyC);
  root.setProperty('--aura-a', p.auraA);
  root.setProperty('--aura-b', p.auraB);
  root.setProperty('--ambient-top', p.ambientTop);
  root.setProperty('--ambient-gold', p.ambientGold);
  root.setProperty('--ambient-line', p.ambientLine);
  document.body.dataset.daypart = name;
}

function syncDayPart() {
  applyDayPart(getDayPartForHour(new Date().getHours()));
}

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 1.25);
  W = window.innerWidth;
  H = window.innerHeight;
  perfScale = W < 700 || H < 760 ? 0.82 : W < 1100 ? 0.9 : 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = W * 0.5;
  cy = H * (W < 640 ? 0.49 : 0.515);
}

if (screen.orientation && screen.orientation.addEventListener) {

function getParams(st) {
  const p = {
    openness: 0.58,
    pulse: 0.08,
    spin: 0.07,
    flare: 0.22,
    glow: 0.22,
    particles: 0.26,
  };
  if (st === 'listening') {
    p.openness = 0.54; p.pulse = 0.1; p.spin = 0.11; p.flare = 0.34; p.glow = 0.36; p.particles = 0.38;
  } else if (st === 'thinking') {
    p.openness = 0.48; p.pulse = 0.04; p.spin = 0.07; p.flare = 0.16; p.glow = 0.2; p.particles = 0.14;
  } else if (st === 'speaking') {
    p.openness = 0.62; p.pulse = 0.12; p.spin = 0.09; p.flare = 0.46; p.glow = 0.42; p.particles = 0.34;
  } else if (st === 'error') {
    p.openness = 0.34; p.pulse = 0.05; p.spin = 0.04; p.flare = 0.16; p.glow = 0.16; p.particles = 0.12;
  }
  if (currentMode === 'fast') {
    p.spin *= 1.08;
    p.pulse *= 1.04;
  } else if (currentMode === 'deep') {
    p.spin *= 0.82;
    p.glow *= 1.16;
  }
  return p;
}

let prevParams = getParams('idle');
let targetParams = getParams('idle');
let cur = Object.assign({}, prevParams);

function updateModeChrome() {
  const label = MODE_COPY[currentMode] || currentMode;
  if (modeLabel.textContent !== label) modeLabel.textContent = label;
}

function setStatusMessage(message) {
  const next = message || '';
  if (micStatusMessage === next) return;

function applyMicAvailability() {

function setMicAvailability(available, message) {

function updateStatusChrome() {

  if (stateWord.textContent !== copy.word) stateWord.textContent = copy.word;

function setState(newState, force) {
  if (newState === state && !force) return;
  state = newState;
  prevParams = Object.assign({}, cur);
  targetParams = getParams(newState);
  transBlend = 0;
  transDuration = ({ idle: 1.0, listening: 0.32, thinking: 0.5, speaking: 0.3, error: 0.55 })[newState] || 0.9;
  if (currentMode === 'fast') transDuration *= 0.8;
  if (currentMode === 'deep') transDuration *= 1.22;
  if (newState === 'error') errorTimer = 0;
  updateStatusChrome();
}

function setAmplitude(v) { ampTarget = clamp01(v); }
window.vritti = { setState, getState: function () { return state; }, setAmplitude };

function blend(dt) {
  if (transBlend < 1) transBlend = Math.min(1, transBlend + dt / transDuration);
  const b = easeOut(transBlend);
  Object.keys(targetParams).forEach(function (key) {
    cur[key] = lerp(prevParams[key], targetParams[key], b);
  });
}

function drawGlow(x, y, r, color, alpha) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, rgba(color, alpha));
  g.addColorStop(0.4, rgba(color, alpha * 0.42));
  g.addColorStop(1, rgba(color, 0));
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, TAU);
  ctx.fill();
}

function drawPetal(x, y, angle, length, width, color, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(width * 0.1, -width * 0.26, width * 0.92, -length * 0.54, length, 0);
  ctx.bezierCurveTo(width * 0.92, length * 0.54, width * 0.1, width * 0.26, 0, 0);
  ctx.closePath();
  const g = ctx.createLinearGradient(0, -length * 0.16, length, length * 0.16);
  g.addColorStop(0, rgba(mix(color, [255, 255, 255], 0.44), alpha * 0.22));
  g.addColorStop(0.42, rgba(color, alpha * 0.58));
  g.addColorStop(1, rgba(mix(color, [10, 12, 16], 0.1), alpha * 0.04));
  ctx.fillStyle = g;
  ctx.fill();
  ctx.restore();
}

function drawSoftRing(radius, color, alpha, width, rotation, arcSpan) {
  ctx.beginPath();
  ctx.arc(cx, cy, radius, rotation, rotation + arcSpan);
  ctx.strokeStyle = rgba(color, alpha);
  ctx.lineWidth = width;
  ctx.stroke();
}

function drawLotusMandala() {
  const base = Math.min(W, H) * (perfScale < 0.9 ? 0.102 : 0.114);
  const p = pal();
  const dp = dayPal();
  const breathWave = Math.sin(t * 0.58) * 0.55 + Math.sin(t * 0.23 + 0.9) * 0.45;
  const ambientBreath = breathWave * (0.008 + cur.pulse * 0.045);
  const focusTension = state === 'listening'
    ? -0.045 - amp * 0.008 + Math.sin(t * 1.6) * 0.005
    : state === 'thinking'
      ? -0.072 + Math.sin(t * 0.74) * 0.003
      : state === 'speaking'
        ? 0.018 + amp * 0.014 + Math.sin(t * 2.5) * 0.006
        : Math.sin(t * 0.92) * 0.004;
  const bloom = 1 + (cur.openness - 0.58) * 0.16 + ambientBreath + focusTension;
  const haloLift = state === 'speaking'
    ? 0.12 + amp * 0.16
    : state === 'listening'
      ? 0.08 + Math.max(amp * 0.04, 0.02)
      : state === 'thinking'
        ? 0.035
        : 0.05;
  const corePulse = state === 'speaking'
    ? 0.02 + amp * 0.04 + Math.sin(t * 5.2) * 0.009
    : state === 'listening'
      ? 0.008 + Math.sin(t * 2.6) * 0.004
      : state === 'thinking'
        ? 0.004 + Math.sin(t * 1.2) * 0.002
        : 0.006 + Math.sin(t * 1.4) * 0.003;
  const rot = t * cur.spin;
  const outerCount = 8;
  const midCount = 8;
  const innerCount = perfScale < 0.9 ? 6 : 7;

  drawGlow(cx, cy - base * 0.18, base * 7.6, dp.glowA, 0.092 + cur.glow * 0.03 + haloLift * 0.02);
  drawGlow(cx, cy + base * 0.22, base * 5.8, dp.glowB, 0.078 + cur.flare * 0.025 + haloLift * 0.016);
  drawGlow(cx, cy, base * 4.3, p.a, 0.082 + cur.glow * 0.045 + haloLift * 0.035);
  drawGlow(cx, cy, base * 3.2, p.b, 0.055 + cur.glow * 0.04 + haloLift * 0.025);
  drawGlow(cx, cy, base * 1.6, p.c, 0.075 + cur.flare * 0.045 + corePulse * 0.3);

  drawSoftRing(base * 1.18, mix(p.c, p.a, 0.18), 0.11 + cur.glow * 0.05 + corePulse * 0.12, 1.1, rot * 0.18, TAU);
  drawSoftRing(base * 2.18, mix(p.a, p.b, 0.2), 0.075 + cur.glow * 0.045 + haloLift * 0.03, 0.9, rot * -0.1, TAU);

  if (state === 'listening') {
    const focusArc = TAU * 0.16;
    drawSoftRing(base * 2.42, mix(p.c, p.a, 0.24), 0.16 + cur.glow * 0.04, 1.25, rot * 0.2, focusArc);
    drawSoftRing(base * 2.42, mix(p.c, p.a, 0.24), 0.14 + cur.glow * 0.035, 1.25, rot * 0.2 + Math.PI, focusArc);
  } else if (state === 'speaking') {
    const wave = 0.5 + 0.5 * Math.sin(t * 4.6);
    drawSoftRing(base * (2.48 + wave * 0.08), mix(p.a, p.c, 0.28), 0.13 + cur.flare * 0.07 + amp * 0.04, 1.3, rot * 0.08, TAU * 0.82);
    drawSoftRing(base * (2.8 + wave * 0.06), mix(p.b, p.a, 0.32), 0.09 + cur.glow * 0.05, 0.95, rot * -0.06 + 0.4, TAU * 0.58);
  } else if (state === 'thinking') {
    drawSoftRing(base * 2.34, mix(p.c, p.b, 0.24), 0.09 + cur.glow * 0.025, 1.0, rot * 0.05, TAU * 0.66);
  }

  const dotRings = perfScale < 0.9 ? 2 : 3;
  for (let r = 0; r < dotRings; r++) {
    const dots = 10 + r * 8;
    const rr = base * (1.6 + r * 0.58);
    const drift = rot * (r % 2 ? -0.22 : 0.28) + r * 0.18;
    for (let i = 0; i < dots; i++) {
      const ang = drift + i * (TAU / dots);
      const px = cx + Math.cos(ang) * rr;
      const py = cy + Math.sin(ang) * rr;
      const size = (r === 0 ? 2.2 : r === 1 ? 1.6 : 1.2) + amp * 0.28;
      ctx.beginPath();
      ctx.arc(px, py, size, 0, TAU);
      ctx.fillStyle = rgba(i % 3 === 0 ? p.c : i % 2 ? p.a : p.b, 0.12 + cur.particles * 0.08 - r * 0.02);
      ctx.fill();
    }
  }

  const layers = [
    { count: outerCount, len: base * 2.48 * bloom, wid: base * 1.18, alpha: 0.34, offset: rot * 0.12, color: mix(p.a, p.c, 0.08) },
    { count: midCount, len: base * 2.02 * (1 + ambientBreath * 0.7 + focusTension * 0.75), wid: base * 0.92, alpha: 0.28, offset: rot * -0.1 + TAU / 16, color: mix(p.b, p.c, 0.22) },
    { count: innerCount, len: base * 1.34 * (1 + ambientBreath * 0.55 + focusTension * 0.45), wid: base * 0.58, alpha: 0.24, offset: rot * 0.08 + TAU / 14, color: mix(p.a, p.b, 0.14) },
  ];

  ctx.globalCompositeOperation = 'screen';
  layers.forEach(function (layer) {
    for (let i = 0; i < layer.count; i++) {
      const ang = layer.offset + i * (TAU / layer.count);
      const wobble = 1 + Math.sin(t * 1.05 + i * 0.7) * 0.01 + ambientBreath * 0.45 + amp * 0.012;
      drawPetal(cx, cy, ang, layer.len * wobble, layer.wid, layer.color, layer.alpha);
    }
  });
  ctx.globalCompositeOperation = 'source-over';

  for (let i = 0; i < 6; i++) {
    const ang = rot * 0.16 + i * (TAU / 6);
    drawPetal(cx, cy, ang, base * 0.98 * (1 + corePulse * 0.5), base * 0.34, mix(p.c, p.a, 0.1), 0.2 + cur.flare * 0.05);
  }

  ctx.beginPath();
  ctx.arc(cx, cy, base * (0.45 + corePulse), 0, TAU);
  ctx.fillStyle = rgba(mix(p.c, [255, 255, 255], 0.12), 0.86);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx, cy, base * (0.74 + corePulse * 0.38), 0, TAU);
  ctx.strokeStyle = rgba(p.c, 0.1 + cur.glow * 0.06 + haloLift * 0.02);
  ctx.lineWidth = 1;
  ctx.stroke();

  const moteCount = perfScale < 0.9 ? 8 : 12;
  for (let i = 0; i < moteCount; i++) {
    const ang = i * (TAU / moteCount) + t * (0.08 + i * 0.002);
    const rr = base * (2.9 + (i % 3) * 0.14);
    const px = cx + Math.cos(ang) * rr;
    const py = cy + Math.sin(ang) * rr;
    const size = 1.3 + (i % 2) * 0.45 + haloLift * 0.35;
    ctx.beginPath();
    ctx.arc(px, py, size, 0, TAU);
    ctx.fillStyle = rgba(i % 2 ? p.a : p.b, 0.08 + cur.particles * 0.1);
    ctx.fill();
  }

  if (state === 'error') {
    ctx.strokeStyle = rgba([185, 129, 123], 0.5);
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 8]);
    ctx.beginPath();
    ctx.arc(cx, cy, base * 2.95, 0, TAU);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function frame(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  t += dt;

  if (state === 'error') {
    errorTimer += dt;
    if (errorTimer > 2.5) setState('idle');
  }

  blend(dt);
  if (state === 'speaking' && !micActive) {
    if (currentAudio && playbackAnalyser && playbackWaveform) {
      ampTarget = sampleRms(playbackAnalyser, playbackWaveform, 6.5);
    } else {
      ampTarget = Math.max(0, 0.24 + 0.18 * Math.sin(t * 6.7) * Math.sin(t * 3.1) + 0.06 * Math.sin(t * 10.2));
    }
  }
  amp += (ampTarget - amp) * Math.min(1, dt * 10);

  const p = pal();
  ctx.fillStyle = 'rgb(' + p.bg[0] + ',' + p.bg[1] + ',' + p.bg[2] + ')';
  ctx.fillRect(0, 0, W, H);

  const vignette = ctx.createRadialGradient(cx, cy, Math.min(W, H) * 0.08, cx, cy, Math.max(W, H) * 0.6);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.42)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  drawLotusMandala();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

let micActive = false;
let micAnalyser = null;
let waveform = null;
let barLoopRunning = false;
let micStream = null;
let mediaRecorder = null;
let recordedChunks = [];
let processing = false;
let silenceTimer = null;
let voiceSocket = null;
let streamingMode = false;
let voiceSocketSupported = true;
let playbackQueue = Promise.resolve();
let currentAudio = null;
let currentAudioDone = null;
let playbackGeneration = 0;
let voiceRequestGeneration = 0;
let activeVoiceRequestController = null;
let suppressIncomingAudio = false;
let audioCtx = null;
let micSource = null;
let playbackAnalyser = null;
let playbackWaveform = null;
let playbackSource = null;
let micStarting = false;
let micAvailable = true;
let micIssueActive = false;
let micStatusMessage = '';
let browserMicPermission = 'unknown';
let browserHasAudioInput = null;
let runtimeBackendReachable = true;
let runtimeOffline = false;
const SILENCE_THRESHOLD = 0.02;
const SILENCE_TIMEOUT = 650;
const MAX_RECORDING_MS = 12000;
const MIN_RECORDING_MS = 1200;
let STREAMING_CHUNK_MS = 120;
let PCM_SAMPLE_RATE = 16000;
const micBtn = document.getElementById('micBtn');
let runtimeConfigPromise = null;
let recordingStartedAt = 0;
let pendingSpeechEnd = false;
const modes = ['fast', 'deep'];
let micLoopHandle = 0;

function clampInt(v, min, max, fb) {
  const n = parseInt(v, 10);
  return Number.isFinite(n) ? Math.max(min, Math.min(max, n)) : fb;
}

async function loadRuntimeConfig() {
  try {
    const r = await fetch('/v1/config', { signal: AbortSignal.timeout(2000) });
    if (!r.ok) return;
    const d = await r.json();
    STREAMING_CHUNK_MS = clampInt(d.voice_stream_frame_ms, 20, 5000, STREAMING_CHUNK_MS);
    PCM_SAMPLE_RATE = clampInt(d.voice_stream_sample_rate, 8000, 48000, PCM_SAMPLE_RATE);
  } catch {}
}

function ensureRuntimeConfig() {
  if (!runtimeConfigPromise) runtimeConfigPromise = loadRuntimeConfig();
  return runtimeConfigPromise;
}

async function checkBrowserMicAccess() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    browserHasAudioInput = false;
    browserMicPermission = 'unsupported';
    return;
  }
  if (navigator.mediaDevices.enumerateDevices) {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      browserHasAudioInput = devices.some(function (device) { return device.kind === 'audioinput'; });
    } catch {}
  }
  if (navigator.permissions && navigator.permissions.query) {
    try {
      const result = await navigator.permissions.query({ name: 'microphone' });
      browserMicPermission = result.state || 'unknown';
      result.onchange = function () {
        browserMicPermission = result.state || 'unknown';
        syncMicAvailability();
      };
    } catch {}
  }
}

async function loadRuntimeHealth() {
  if (document.hidden) return;
  try {
    const response = await fetch('/health', { signal: AbortSignal.timeout(2000) });
    if (!response.ok) return;
    const data = await response.json();
    runtimeBackendReachable = data.backend === 'reachable';
    runtimeOffline = !runtimeBackendReachable;
    if (runtimeOffline && !micActive && !processing && !currentAudio) setState('error', true);
    if (!runtimeOffline && state === 'error' && !micIssueActive && !micActive && !processing && !currentAudio) {
      setState('idle', true);
    }
  } catch {
    runtimeBackendReachable = false;
    runtimeOffline = true;
    if (!micActive && !processing && !currentAudio) setState('error', true);
  }
}

function syncMicAvailability() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setMicAvailability(false, 'Microphone unsupported.');
    return;
  }
  if (browserMicPermission === 'denied') {
    setMicAvailability(false, 'Allow microphone in Chromium.');
    return;
  }
  if (browserHasAudioInput === false) {
    setMicAvailability(false, 'No browser microphone detected.');
    return;
  }
  setMicAvailability(true, '');
}

async function refreshMicAvailability() {
  await Promise.all([loadRuntimeHealth(), checkBrowserMicAccess()]);
  syncMicAvailability();
}

function ensureAudioContext() {
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});
  return audioCtx;
}

function sampleRms(analyser, data, scale) {
  if (!analyser || !data) return 0;
  analyser.getFloatTimeDomainData(data);
  let tot = 0;
  for (let i = 0; i < data.length; i++) tot += data[i] * data[i];
  return Math.min(1, Math.sqrt(tot / data.length) * scale);
}

function disconnectPlaybackSource() {
  if (!playbackSource) return;
  try { playbackSource.disconnect(); } catch {}
  playbackSource = null;
}

function attachPlaybackAnalyser(audio) {
  try {
    const ctx = ensureAudioContext();
    disconnectPlaybackSource();
    if (!playbackAnalyser) {
      playbackAnalyser = ctx.createAnalyser();
      playbackAnalyser.fftSize = 1024;
      playbackAnalyser.smoothingTimeConstant = 0.5;
      playbackAnalyser.connect(ctx.destination);
      playbackWaveform = new Float32Array(playbackAnalyser.fftSize);
    }
    playbackSource = ctx.createMediaElementSource(audio);
    playbackSource.connect(playbackAnalyser);
    return true;
  } catch {
    disconnectPlaybackSource();
    return false;
  }
}

function setMicRingLevel(level) {
  micLevelArc.style.strokeDashoffset = String(RING_LEN * (1 - clamp01(level)));
}

function operationActive() {
  return micActive || micStarting || processing || Boolean(currentAudio);
}

function updateStopBtn() {
  const active = operationActive();
  stopBtn.hidden = !active;
  stopBtn.disabled = !active;
  stopBtn.setAttribute('aria-hidden', active ? 'false' : 'true');
}

function updateMicBtn() {
  if (micActive || micStarting) micBtn.classList.add('active');
  else micBtn.classList.remove('active');
  micWrap.classList.toggle('listening', micActive || micStarting);
  if (!micActive && micAvailable) setMicRingLevel(0);
  applyMicAvailability();
  updateStopBtn();
}

function stopRecording() {
  if (!micActive) return;
  micActive = false;
  barLoopRunning = false;
  if (micLoopHandle) {
    cancelAnimationFrame(micLoopHandle);
    micLoopHandle = 0;
  }
  updateMicBtn();
  if (silenceTimer) {
    clearTimeout(silenceTimer);
    silenceTimer = null;
  }
  const wsOpen = streamingMode && voiceSocket && voiceSocket.readyState === WebSocket.OPEN;
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    if (wsOpen) pendingSpeechEnd = true;
    else {
      try { mediaRecorder.requestData(); } catch {}
    }
    mediaRecorder.stop();
    if (wsOpen) {
      processing = true;
      setState('thinking');
      setAmplitude(0);
    }
  } else if (wsOpen) {
    voiceSocket.send(JSON.stringify({ type: 'speech_ended' }));
    processing = true;
    setState('thinking');
    setAmplitude(0);
  } else {
    processing = false;
    setAmplitude(0);
    if (state !== 'error') setState('idle');
  }
  updateStopBtn();
}

function stopCurrentPlayback() {
  playbackGeneration += 1;
  if (!currentAudio) return;
  const done = currentAudioDone;
  currentAudioDone = null;
  currentAudio.pause();
  currentAudio.currentTime = 0;
  disconnectPlaybackSource();
  currentAudio = null;
  setAmplitude(0);
  if (done) done();
  updateStopBtn();
}

function queueAudioPlayback(bytes, mime) {
  const generation = playbackGeneration;
  playbackQueue = playbackQueue.then(function () {
    return new Promise(function (resolve) {
      if (generation !== playbackGeneration) {
        resolve();
        return;
      }
      const url = URL.createObjectURL(new Blob([bytes], { type: mime || 'audio/mp3' }));
      const audio = new Audio(url);
      currentAudio = audio;
      updateStopBtn();
      setState('speaking');
      attachPlaybackAnalyser(audio);
      const done = function () {
        currentAudioDone = null;
        disconnectPlaybackSource();
        setAmplitude(0);
        URL.revokeObjectURL(url);
        if (currentAudio === audio) currentAudio = null;
        updateStopBtn();
        resolve();
      };
      currentAudioDone = done;
      audio.onended = done;
      audio.onerror = done;
      audio.onpause = function () {
        if (audio.ended) return;
        setAmplitude(0);
      };
      audio.play().catch(done);
    });
  });
  return playbackQueue;
}

function closeVoiceSocket() {
  if (!voiceSocket) return;
  try {
    if (voiceSocket.readyState === WebSocket.OPEN) voiceSocket.send(JSON.stringify({ type: 'session_end' }));
    voiceSocket.close();
  } catch {}
  voiceSocket = null;
}

function encodeBytesBase64(bytes) {
  let s = '';
  const step = 0x8000;
  for (let i = 0; i < bytes.length; i += step) {
    s += String.fromCharCode.apply(null, bytes.subarray(i, i + step));
  }
  return btoa(s);
}

async function encodeBlobBase64(blob) {
  return encodeBytesBase64(new Uint8Array(await blob.arrayBuffer()));
}

function handleVoiceEvent(msg) {
  if (msg.type === 'session_ready') {
    suppressIncomingAudio = false;
    return;
  }
  if (msg.type === 'session_unavailable') {
    voiceSocketSupported = false;
    streamingMode = false;
    processing = false;
    suppressIncomingAudio = false;
    closeVoiceSocket();
    if (micActive) setState('listening');
    return;
  }
  if (msg.type === 'transcript_partial' || msg.type === 'stt' || msg.type === 'transcript_final') return;
  if (msg.type === 'assistant_audio_chunk' || msg.type === 'audio') {
    if (suppressIncomingAudio) return;
    queueAudioPlayback(Uint8Array.from(atob(msg.data), function (c) { return c.charCodeAt(0); }), msg.mime_type || 'audio/mp3');
    return;
  }
  if (msg.type === 'assistant_done' || msg.type === 'done') {
    suppressIncomingAudio = false;
    playbackQueue.finally(function () {
      if (micActive) setState('listening');
      else setState('idle');
      setAmplitude(0);
      processing = false;
      if (!micActive) closeVoiceSocket();
    });
    return;
  }
  if (msg.type === 'cancelled') {
    suppressIncomingAudio = false;
    stopCurrentPlayback();
    if (micActive) setState('listening');
    else setState('idle');
    setAmplitude(0);
    processing = false;
    if (!micActive) closeVoiceSocket();
    return;
  }
  if (msg.type === 'error') {
    suppressIncomingAudio = false;
    if (String(msg.detail || '').includes('HTTP 404')) {
      voiceSocketSupported = false;
      streamingMode = false;
      processing = false;
      closeVoiceSocket();
      if (micActive) setState('listening');
      return;
    }
    stopCurrentPlayback();
    setState('error');
    setTimeout(function () { setState('idle'); }, 2000);
    processing = false;
    closeVoiceSocket();
  }
}

function connectVoiceSocket() {
  if (!voiceSocketSupported) return Promise.reject(new Error('disabled'));
  return new Promise(function (resolve, reject) {
    const conversationId = touchConversation();
    const ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/v1/voice/ws');
    let settled = false;
    ws.onopen = function () {
      settled = true;
      voiceSocket = ws;
      ws.send(JSON.stringify({ type: 'session_start', mode: currentMode || 'fast', conversation_id: conversationId }));
      resolve(ws);
    };
    ws.onmessage = function (e) {
      try { handleVoiceEvent(JSON.parse(e.data)); } catch {}
    };
    ws.onerror = function () {
      if (!settled) reject(new Error('ws failed'));
    };
    ws.onclose = function () {
      if (voiceSocket === ws) voiceSocket = null;
      streamingMode = false;
      processing = false;
      if (!settled) {
        reject(new Error('ws closed'));
        return;
      }
      if (!micActive) {
        playbackQueue.finally(function () {
          processing = false;
          setAmplitude(0);
          if (state !== 'error') setState('idle');
        });
      }
    };
  });
}

async function sendAudioToGateway(blob) {
  const requestGeneration = voiceRequestGeneration;
  const controller = new AbortController();
  activeVoiceRequestController = controller;
  processing = true;
  updateStopBtn();
  setState('thinking');
  setAmplitude(0);
  try {
    const conversationId = touchConversation();
    const form = new FormData();
    form.append('file', blob, 'audio.webm');
    const resp = await fetch('/v1/voice-proxy', {
      method: 'POST',
      headers: { 'x-voice-mode': currentMode || 'fast', 'x-conversation-id': conversationId },
      signal: controller.signal,
      body: form,
    });
    if (!resp.ok) {
      if (requestGeneration !== voiceRequestGeneration) return;
      setState('error');
      setTimeout(function () { setState('idle'); }, 2000);
      processing = false;
      updateStopBtn();
      return;
    }
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      if (requestGeneration !== voiceRequestGeneration) {
        try { await reader.cancel(); } catch {}
        return;
      }
      const chunk = await reader.read();
      if (chunk.done) break;
      buf += dec.decode(chunk.value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (requestGeneration !== voiceRequestGeneration) {
          try { await reader.cancel(); } catch {}
          return;
        }
        if (!line.trim()) continue;
        try {
          const msg = JSON.parse(line);
          if (msg.type === 'audio') {
            setState('speaking');
            const audioData = Uint8Array.from(atob(msg.data), function (c) { return c.charCodeAt(0); });
            await queueAudioPlayback(audioData, 'audio/mp3');
          } else if (msg.type === 'error') {
            if (requestGeneration !== voiceRequestGeneration) return;
            setState('error');
            setTimeout(function () { setState('idle'); }, 2000);
          }
        } catch {}
      }
    }
  } catch (error) {
    if (requestGeneration !== voiceRequestGeneration || String(error && error.name || '') === 'AbortError') {
      return;
    }
    setState('error');
    setTimeout(function () { setState('idle'); }, 2000);
  } finally {
    if (activeVoiceRequestController === controller) activeVoiceRequestController = null;
  }
  if (requestGeneration !== voiceRequestGeneration) return;
  setState('idle');
  setAmplitude(0);
  processing = false;
  updateStopBtn();
}

async function startStreamingVoice() {
  suppressIncomingAudio = false;
  if (voiceSocket && voiceSocket.readyState === WebSocket.OPEN) {
    streamingMode = true;
  } else {
    try {
      await connectVoiceSocket();
      streamingMode = true;
    } catch (e) {
      if (String(e && e.message || '').includes('404')) voiceSocketSupported = false;
      streamingMode = false;
    }
  }
  recordedChunks = [];
  pendingSpeechEnd = false;
  const chunkMs = streamingMode ? STREAMING_CHUNK_MS : Math.min(STREAMING_CHUNK_MS, 120);
  mediaRecorder = new MediaRecorder(micStream, { mimeType: 'audio/webm;codecs=opus' });
  mediaRecorder.ondataavailable = async function (e) {
    if (!e.data || e.data.size <= 0) return;
    if (streamingMode && voiceSocket && voiceSocket.readyState === WebSocket.OPEN) {
      try {
        voiceSocket.send(JSON.stringify({
          type: 'audio_chunk',
          format: 'webm',
          mime_type: e.data.type || 'audio/webm',
          chunk_ms: chunkMs,
          data: await encodeBlobBase64(e.data),
        }));
        return;
      } catch {}
    }
    recordedChunks.push(e.data);
  };
  mediaRecorder.onstop = async function () {
    if (streamingMode && voiceSocket && voiceSocket.readyState === WebSocket.OPEN) {
      if (pendingSpeechEnd) {
        pendingSpeechEnd = false;
        voiceSocket.send(JSON.stringify({ type: 'speech_ended' }));
      }
      return;
    }
    if (recordedChunks.length > 0) await sendAudioToGateway(new Blob(recordedChunks, { type: 'audio/webm' }));
    else {
      setState('idle');
      setAmplitude(0);
    }
  };
  mediaRecorder.start(chunkMs);
}

async function toggleMic() {
  if (micStarting || processing || currentAudio) return;
  await refreshMicAvailability();
  if (!micAvailable) return;
  touchConversation();
  await ensureRuntimeConfig();
  if (micActive) {
    if (currentAudio) {
      stopCurrentPlayback();
      if (voiceSocket && voiceSocket.readyState === WebSocket.OPEN) voiceSocket.send(JSON.stringify({ type: 'interrupt' }));
    }
    stopRecording();
    return;
  }

  micStarting = true;
  setState('listening');
  updateMicBtn();

  if (!micStream) {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      browserMicPermission = 'granted';
      browserHasAudioInput = true;
      syncMicAvailability();
    } catch (error) {
      const name = String(error && error.name || '');
      if (name === 'NotAllowedError' || name === 'SecurityError') {
        browserMicPermission = 'denied';
        setMicAvailability(false, 'Allow microphone in Chromium.');
      } else if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
        browserHasAudioInput = false;
        setMicAvailability(false, 'No browser microphone detected.');
      } else {
        setMicAvailability(false, 'Microphone start failed.');
      }
      micStarting = false;
      if (!micIssueActive) setState('idle');
      updateMicBtn();
      return;
    }
    if (!audioCtx) audioCtx = new AudioContext({ sampleRate: PCM_SAMPLE_RATE });
    micSource = audioCtx.createMediaStreamSource(micStream);
    const gain = audioCtx.createGain();
    gain.gain.value = 4.0;
    micAnalyser = audioCtx.createAnalyser();
    micAnalyser.fftSize = 2048;
    micAnalyser.smoothingTimeConstant = 0.3;
    micSource.connect(gain);
    gain.connect(micAnalyser);
    waveform = new Float32Array(micAnalyser.fftSize);
    setInterval(function () {
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }, 1000);
  }

  await startStreamingVoice();
  recordingStartedAt = performance.now();
  micStarting = false;
  micActive = true;
  processing = streamingMode;
  setState('listening');
  updateMicBtn();
  if (streamingMode && voiceSocket && voiceSocket.readyState === WebSocket.OPEN) {
    voiceSocket.send(JSON.stringify({ type: 'speech_started' }));
  }

  if (!barLoopRunning) {
    barLoopRunning = true;
    let smoothRms = 0;
    let silenceStart = 0;
    (function micLoop() {
      if (!barLoopRunning) {
        micLoopHandle = 0;
        return;
      }
      if (micActive && micAnalyser && waveform) {
        smoothRms += (sampleRms(micAnalyser, waveform, 5) - smoothRms) * 0.3;
        setAmplitude(smoothRms);
        setMicRingLevel(smoothRms);
        if (smoothRms < SILENCE_THRESHOLD) {
          const now = performance.now();
          if (now - recordingStartedAt < MIN_RECORDING_MS) silenceStart = 0;
          else if (!silenceStart) silenceStart = now;
          else if (now - silenceStart > SILENCE_TIMEOUT) {
            silenceStart = 0;
            stopRecording();
          }
        } else {
          silenceStart = 0;
        }
      }
      micLoopHandle = requestAnimationFrame(micLoop);
    })();
  }

  silenceTimer = setTimeout(function () {
    if (micActive) stopRecording();
  }, MAX_RECORDING_MS);
}

function cancelCurrentOperation() {
  if (!operationActive()) return;
  voiceRequestGeneration += 1;
  suppressIncomingAudio = true;
  recordedChunks = [];
  pendingSpeechEnd = false;
  if (silenceTimer) {
    clearTimeout(silenceTimer);
    silenceTimer = null;
  }
  if (activeVoiceRequestController) {
    try { activeVoiceRequestController.abort(); } catch {}
    activeVoiceRequestController = null;
  }
  const wsOpen = voiceSocket && voiceSocket.readyState === WebSocket.OPEN;
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    micActive = false;
    barLoopRunning = false;
    if (micLoopHandle) {
      cancelAnimationFrame(micLoopHandle);
      micLoopHandle = 0;
    }
    try { mediaRecorder.stop(); } catch {}
  }
  stopCurrentPlayback();
  processing = false;
  if (wsOpen) {
    voiceSocket.send(JSON.stringify({ type: 'interrupt' }));
  } else {
    closeVoiceSocket();
  }
  setAmplitude(0);
  setState('idle', true);
  updateMicBtn();
}

micBtn.addEventListener('click', toggleMic);
stopBtn.addEventListener('click', cancelCurrentOperation);
window.addEventListener('focus', refreshMicAvailability);
document.addEventListener('visibilitychange', function () {
  if (!document.hidden) refreshMicAvailability();
});

async function pollState() {
  if (document.hidden) return;
  if (micActive || processing || currentAudio || micIssueActive || runtimeOffline) return;
  try {
    const r = await fetch('/v1/state', { signal: AbortSignal.timeout(2000) });
    if (!r.ok) return;
    const d = await r.json();
    if (!d.state || d.state === 'error') return;
    if (d.state !== state) setState(d.state);
  } catch {}
}
setInterval(pollState, STATE_POLL_MS);
setInterval(loadRuntimeHealth, HEALTH_POLL_MS);

async function loadMode() {
  try {
    const r = await fetch('/v1/mode', { signal: AbortSignal.timeout(2000) });
    if (r.ok) currentMode = (await r.json()).mode || 'fast';
  } catch {}
  updateModeChrome();
}

modeBtn.addEventListener('click', async function (e) {
  e.stopPropagation();
  currentMode = modes[(modes.indexOf(currentMode) + 1) % modes.length];
  updateModeChrome();
  setState(state, true);
  try {
    await fetch('/v1/mode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: currentMode }),
    });
  } catch {}
});

updateStatusChrome();
updateModeChrome();
loadMode();
ensureRuntimeConfig();
refreshMicAvailability();
</script>
