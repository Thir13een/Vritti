<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Vritti</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;cursor:none;
  -webkit-user-select:none;user-select:none}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;will-change:transform}
#healthDot{position:fixed;top:16px;right:16px;width:8px;height:8px;border-radius:50%;
  background:#555;z-index:20;transition:background 0.5s,box-shadow 0.5s}
#healthDot.green{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,0.4)}
#healthDot.yellow{background:#facc15;box-shadow:0 0 6px rgba(250,204,21,0.4)}
#healthDot.red{background:#f87171;box-shadow:0 0 6px rgba(248,113,113,0.4)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="healthDot"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const healthDot = document.getElementById('healthDot');
const TAU = Math.PI * 2;

const COL = {
  saffron: [232, 121, 36],
  teal:    [0, 77, 64],
  tealLt:  [0, 105, 85],
  gold:    [255, 215, 64],
  white:   [236, 239, 241],
};

let W, H, cx, cy, s;
let t = 0, lastTime = 0;
let state = 'idle', transBlend = 1, transDuration = 1;

// Transition durations (s)
const TRANS_DURATIONS = {
  idle: 0.8, listening: 0.4, thinking: 0.4, speaking: 0.4, error: 0.3
};

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = W / 2; cy = H / 2;
  s = Math.max(0.4, Math.min(2.5, Math.min(W, H) / 620));
}
window.addEventListener('resize', resize);
screen.orientation && screen.orientation.addEventListener('change', () => setTimeout(resize, 100));
resize();

function lerp(a, b, t) { return a + (b - a) * t; }
function ease(t) { return t * t * (3 - 2 * t); }
function rgba(c, a) { return `rgba(${c[0]},${c[1]},${c[2]},${Math.max(0, a)})`; }

// Error color tint
const ERR_COL = [180, 50, 30];
function tintCol(c, tint) {
  if (tint < 0.01) return c;
  return [
    Math.round(lerp(c[0], ERR_COL[0], tint)),
    Math.round(lerp(c[1], ERR_COL[1], tint)),
    Math.round(lerp(c[2], ERR_COL[2], tint)),
  ];
}

// State params
function getParams(st) {
  const p = {
    coreR: 24, coreGlow: 0.8, pulseSpeed: 1.2, pulseAmp: 0.06,
    ring1Alpha: 0.22, ring1Rot: 0.1,
    ring2Alpha: 0.16, ring2Rot: -0.06,
    ring3Alpha: 0.1, ring3Rot: 0.03,
    dotAlpha: 0.24, dotPulse: 0.15,
    petalAlpha: 0.15, petalRot: 0.05,
    waveAlpha: 0.09, waveSpeed: 0.6, waveCount: 2,
    yantraAlpha: 0.1, yantraRot: 0.02,
    connectAlpha: 0.1,
    breathe: 0.025, breathe2: 0.01,
    blobAlpha: 0.08, blobSpeed: 0.3, blobScale: 1,
    tendrilAlpha: 0.07, tendrilSpeed: 0.2,
    warpAmt: 0.06,
    errorTint: 0,
  };
  switch (st) {
    case 'listening':
      p.coreR = 18; p.coreGlow = 1.0; p.pulseSpeed = 0.8; p.pulseAmp = 0.02;
      p.ring1Alpha = 0.3; p.ring1Rot = 0.02;
      p.ring2Alpha = 0.2; p.ring2Rot = -0.01;
      p.ring3Alpha = 0.08; p.ring3Rot = 0.005;
      p.dotAlpha = 0.35; p.dotPulse = 0.05;
      p.petalAlpha = 0.2; p.petalRot = 0.01;
      p.waveAlpha = 0; p.waveSpeed = 0; p.waveCount = 0;
      p.yantraAlpha = 0.15; p.yantraRot = 0.005;
      p.connectAlpha = 0.15;
      p.breathe = 0.008; p.breathe2 = 0.003;
      p.blobAlpha = 0.04; p.blobSpeed = 0.1; p.blobScale = 0.6;
      p.tendrilAlpha = 0.02; p.tendrilSpeed = 0.05;
      p.warpAmt = 0.02;
      break;
    case 'thinking':
      p.coreR = 18; p.coreGlow = 0.55; p.pulseSpeed = 3.0; p.pulseAmp = 0.04;
      p.ring1Alpha = 0.35; p.ring1Rot = 0.6;
      p.ring2Alpha = 0.3; p.ring2Rot = -0.45;
      p.ring3Alpha = 0.25; p.ring3Rot = 0.3;
      p.dotAlpha = 0.15; p.dotPulse = 0.4;
      p.petalAlpha = 0.05; p.petalRot = 0.2;
      p.waveAlpha = 0.03; p.waveSpeed = 0.5; p.waveCount = 1;
      p.yantraAlpha = 0.25; p.yantraRot = 0.12;
      p.connectAlpha = 0.2;
      p.breathe = 0.015; p.breathe2 = 0.008;
      p.blobAlpha = 0.1; p.blobSpeed = 1.2; p.blobScale = 1.1;
      p.tendrilAlpha = 0.08; p.tendrilSpeed = 0.8;
      p.warpAmt = 0.18;
      break;
    case 'speaking':
      p.coreR = 32; p.coreGlow = 1.0; p.pulseSpeed = 2.0; p.pulseAmp = 0.15;
      p.ring1Alpha = 0.2; p.ring1Rot = 0.08;
      p.ring2Alpha = 0.15; p.ring2Rot = -0.05;
      p.ring3Alpha = 0.12; p.ring3Rot = 0.03;
      p.dotAlpha = 0.3; p.dotPulse = 0.4;
      p.petalAlpha = 0.18; p.petalRot = 0.04;
      p.waveAlpha = 0.2; p.waveSpeed = 1.8; p.waveCount = 5;
      p.yantraAlpha = 0.06; p.yantraRot = 0.02;
      p.connectAlpha = 0.08;
      p.breathe = 0.04; p.breathe2 = 0.018;
      p.blobAlpha = 0.12; p.blobSpeed = 0.5; p.blobScale = 1.3;
      p.tendrilAlpha = 0.1; p.tendrilSpeed = 0.35;
      p.warpAmt = 0.08;
      break;
    case 'error':
      p.coreR = 20; p.coreGlow = 0.35; p.pulseSpeed = 0.6; p.pulseAmp = 0.05;
      p.ring1Alpha = 0.1; p.ring1Rot = 0.015;
      p.ring2Alpha = 0.06; p.ring2Rot = -0.01;
      p.ring3Alpha = 0.03; p.ring3Rot = 0.005;
      p.dotAlpha = 0.08; p.dotPulse = 0.1;
      p.petalAlpha = 0.04; p.petalRot = 0.01;
      p.waveAlpha = 0; p.waveSpeed = 0; p.waveCount = 0;
      p.yantraAlpha = 0.03; p.yantraRot = 0.005;
      p.connectAlpha = 0.03;
      p.breathe = 0.01; p.breathe2 = 0;
      p.blobAlpha = 0.03; p.blobSpeed = 0.15; p.blobScale = 0.7;
      p.tendrilAlpha = 0.01; p.tendrilSpeed = 0.05;
      p.warpAmt = 0.03;
      p.errorTint = 1;
      break;
  }
  return p;
}

let prev = getParams('idle');
let tgt = getParams('idle');
let cur = getParams('idle');
let errorTimer = 0;

function setState(newState) {
  if (newState === state) return;
  const fromError = state === 'error';
  state = newState;
  prev = Object.assign({}, cur);
  tgt = getParams(newState);
  transBlend = 0;
transDuration = (fromError && newState === 'idle') ? 1.5 : (TRANS_DURATIONS[newState] || 0.8);
  if (newState === 'error') errorTimer = 0;
}

// Amplitude (0-1) from audio, smoothed
let amp = 0, ampTarget = 0;
function setAmplitude(v) { ampTarget = Math.max(0, Math.min(1, v)); }

window.vritti = { setState, getState: () => state, setAmplitude };

function blend(dt) {
  if (transBlend < 1) {
    transBlend = Math.min(1, transBlend + dt / transDuration);
    const b = ease(transBlend);
    for (const k in tgt) {
      if (typeof tgt[k] === 'number') cur[k] = lerp(prev[k], tgt[k], b);
    }
  }
}

// Vignette
function drawVignette() {
  const r = Math.max(cx, cy) * 1.2;
  const g = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r);
  g.addColorStop(0, 'rgba(10,10,15,0)');
  g.addColorStop(0.7, 'rgba(10,10,15,0)');
  g.addColorStop(1, 'rgba(5,5,8,0.5)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// Blob
function drawBlob(p) {
  if (p.blobAlpha < 0.003) return;
  const baseR = 80 * s * p.blobScale;
  const points = 64;
  const speed = t * p.blobSpeed;

  for (let b = 0; b < 2; b++) {
    const col = b === 0 ? COL.saffron : COL.teal;
    const phase = b * 2.1;
    const alpha = p.blobAlpha * (b === 0 ? 1 : 0.7);

    ctx.beginPath();
    for (let i = 0; i <= points; i++) {
      const a = (i / points) * TAU;
      const warp = baseR * (
        1
        + 0.15 * Math.sin(a * 3 + speed * 0.7 + phase)
        + 0.1 * Math.sin(a * 5 - speed * 0.5 + phase * 1.3)
        + 0.06 * Math.sin(a * 7 + speed * 1.1 + phase * 0.7)
        + p.warpAmt * Math.sin(a * 2 + speed * 0.3)
      );
      const x = Math.cos(a) * warp;
      const y = Math.sin(a) * warp;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();

    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, baseR * 1.3);
    g.addColorStop(0, rgba(col, alpha * 0.6));
    g.addColorStop(0.5, rgba(col, alpha * 0.2));
    g.addColorStop(1, rgba(col, 0));
    ctx.fillStyle = g;
    ctx.fill();
  }
}

// Tendrils
function drawTendrils(p) {
  if (p.tendrilAlpha < 0.003) return;
  const count = 6;
  const speed = t * p.tendrilSpeed;

  ctx.lineWidth = 0.6 * s;

  for (let i = 0; i < count; i++) {
    const baseAngle = (i / count) * TAU + speed * 0.15;
    const col = i % 2 === 0 ? COL.saffron : COL.tealLt;

    ctx.beginPath();
    const startR = 45 * s;
    const sx = Math.cos(baseAngle) * startR;
    const sy = Math.sin(baseAngle) * startR;
    ctx.moveTo(sx, sy);

    const segments = 20;
    let angle = baseAngle;
    let r = startR;
    for (let j = 1; j <= segments; j++) {
      const frac = j / segments;
      angle += 0.08 * Math.sin(speed * 0.8 + i * 1.7 + frac * 3);
      r += (3 + 1.5 * Math.sin(speed + i + frac * 2)) * s;
      const x = Math.cos(angle) * r;
      const y = Math.sin(angle) * r;
      ctx.lineTo(x, y);
    }

    const alpha = p.tendrilAlpha * (0.7 + 0.3 * Math.sin(speed + i * 1.5));
    ctx.strokeStyle = rgba(col, alpha);
    ctx.stroke();
  }
}

// Halo ring
function drawHalo(radius, rot, alpha, color, width) {
  if (alpha < 0.003) return;
  const r = radius * s;
  const w = width * s;
  const pulse = 1 + 0.03 * Math.sin(t * 1.5 + radius * 0.01);

  ctx.save();
  ctx.rotate(t * rot);

  const inner = r * pulse - w;
  const outer = r * pulse + w;
  const g1 = ctx.createRadialGradient(0, 0, inner - w, 0, 0, outer + w);
  g1.addColorStop(0, rgba(color, 0));
  g1.addColorStop(0.3, rgba(color, alpha * 0.15));
  g1.addColorStop(0.5, rgba(color, alpha * 0.3));
  g1.addColorStop(0.7, rgba(color, alpha * 0.15));
  g1.addColorStop(1, rgba(color, 0));
  ctx.beginPath();
  ctx.arc(0, 0, r * pulse, 0, TAU);
  ctx.lineWidth = w * 4;
  ctx.strokeStyle = g1;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(0, 0, r * pulse, 0, TAU);
  ctx.lineWidth = 0.5 * s;
  ctx.strokeStyle = rgba(color, alpha * 0.6);
  ctx.stroke();

  ctx.restore();
}

// Core
function drawCore(p) {
  const pulse = 1 + Math.sin(t * p.pulseSpeed) * p.pulseAmp;
  const r = p.coreR * s * pulse;
  const et = p.errorTint || 0;
  const coreSaffron = tintCol(COL.saffron, et);
  const coreGold = tintCol(COL.gold, et);
  const coreWhite = tintCol(COL.white, et);

  const g1 = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 6);
  g1.addColorStop(0, rgba(coreSaffron, p.coreGlow * 0.08));
  g1.addColorStop(0.5, rgba(coreSaffron, p.coreGlow * 0.02));
  g1.addColorStop(1, rgba(coreSaffron, 0));
  ctx.fillStyle = g1;
  ctx.fillRect(-cx, -cy, W, H);

  const g2 = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 1.2);
  g2.addColorStop(0, rgba(coreWhite, 0.85 * p.coreGlow));
  g2.addColorStop(0.15, rgba(coreGold, 0.65 * p.coreGlow));
  g2.addColorStop(0.4, rgba(coreSaffron, 0.25 * p.coreGlow));
  g2.addColorStop(0.7, rgba(coreSaffron, 0.06 * p.coreGlow));
  g2.addColorStop(1, rgba(coreSaffron, 0));
  ctx.beginPath();
  ctx.arc(0, 0, r * 1.2, 0, TAU);
  ctx.fillStyle = g2;
  ctx.fill();

  const flk = 0.82 + 0.1 * Math.sin(t * 6.7) * Math.sin(t * 3.3)
            + 0.08 * Math.sin(t * 9.1 + 0.5);
  const g3 = ctx.createRadialGradient(0, -r * 0.08, 0, 0, 0, r * 0.35);
  g3.addColorStop(0, rgba(coreWhite, 0.5 * flk * p.coreGlow));
  g3.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.35, 0, TAU);
  ctx.fillStyle = g3;
  ctx.fill();

  for (let i = 1; i <= 2; i++) {
    const rr = r * (0.55 + i * 0.28);
    ctx.beginPath();
    ctx.arc(0, 0, rr, 0, TAU);
    ctx.strokeStyle = rgba(coreGold, (0.1 - i * 0.025) * p.coreGlow);
    ctx.lineWidth = 0.3 * s;
    ctx.stroke();
  }
}

// Dots
function drawDots(radius, count, rot, alpha, pulseAmt, color) {
  if (alpha < 0.003) return;
  const r = radius * s;

  ctx.save();
  ctx.rotate(t * rot * 0.5);
  for (let i = 0; i < count; i++) {
    const a = (i / count) * TAU;
    const x = Math.cos(a) * r;
    const y = Math.sin(a) * r;
    const p = 1 + pulseAmt * Math.sin(t * 1.5 + i * 0.7);
    const sizeVar = (i % 3 === 0) ? 1.3 : (i % 3 === 1) ? 1.0 : 0.7;
    const dotR = 1.3 * s * p * sizeVar;

    const g = ctx.createRadialGradient(x, y, 0, x, y, dotR * 3.5);
    g.addColorStop(0, rgba(color, alpha * p * 0.25));
    g.addColorStop(1, rgba(color, 0));
    ctx.fillStyle = g;
    ctx.fillRect(x - dotR * 3.5, y - dotR * 3.5, dotR * 7, dotR * 7);

    ctx.beginPath();
    ctx.arc(x, y, dotR, 0, TAU);
    ctx.fillStyle = rgba(color, alpha * p);
    ctx.fill();
  }
  ctx.restore();
}

// Petals
function drawPetals(radius, count, rot, alpha, color) {
  if (alpha < 0.003) return;
  const r = radius * s;

  ctx.save();
  ctx.rotate(t * rot);
  ctx.globalAlpha = alpha;

  for (let i = 0; i < count; i++) {
    const ang = (i / count) * TAU;
    const breath = 1 + 0.05 * Math.sin(t * 1.3 + i * (TAU / count) * 0.7);
    const len = r * 0.32 * breath;
    const w = r * 0.1;
    const base = r * 0.48;

    ctx.save();
    ctx.rotate(ang);

    ctx.beginPath();
    ctx.moveTo(base, 0);
    ctx.bezierCurveTo(base + len * 0.3, -w, base + len * 0.7, -w * 0.7, base + len, 0);
    ctx.bezierCurveTo(base + len * 0.7, w * 0.7, base + len * 0.3, w, base, 0);

    const g = ctx.createLinearGradient(base, 0, base + len, 0);
    g.addColorStop(0, rgba(color, 0.7));
    g.addColorStop(0.5, rgba(color, 0.2));
    g.addColorStop(1, rgba(color, 0));
    ctx.fillStyle = g;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(base + 2 * s, 0);
    ctx.quadraticCurveTo(base + len * 0.5, -w * 0.06, base + len * 0.8, 0);
    ctx.strokeStyle = rgba(COL.gold, 0.1);
    ctx.lineWidth = 0.3 * s;
    ctx.stroke();

    ctx.restore();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// Connectors
function drawConnectors(innerR, outerR, count, rot, alpha) {
  if (alpha < 0.003) return;
  const ri = innerR * s;
  const ro = outerR * s;
  const mid = (ri + ro) / 2;

  ctx.save();
  ctx.rotate(t * rot * 0.3);
  ctx.strokeStyle = rgba(COL.saffron, alpha);
  ctx.lineWidth = 0.4 * s;

  for (let i = 0; i < count; i++) {
    const a = (i / count) * TAU;
    const nextA = ((i + 1) / count) * TAU;
    const midA = (a + nextA) / 2;

    const x1 = Math.cos(a) * ri, y1 = Math.sin(a) * ri;
    const x2 = Math.cos(midA) * ro, y2 = Math.sin(midA) * ro;

    const cpA1 = a + (midA - a) * 0.25;
    const cpA2 = a + (midA - a) * 0.75;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.bezierCurveTo(
      Math.cos(cpA1) * (mid + 5 * s), Math.sin(cpA1) * (mid + 5 * s),
      Math.cos(cpA2) * (mid - 5 * s), Math.sin(cpA2) * (mid - 5 * s),
      x2, y2
    );
    ctx.stroke();

    const mx2 = Math.cos(a - (midA - a)) * ro;
    const my2 = Math.sin(a - (midA - a)) * ro;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.bezierCurveTo(
      Math.cos(a - (midA - a) * 0.25) * (mid + 5 * s),
      Math.sin(a - (midA - a) * 0.25) * (mid + 5 * s),
      Math.cos(a - (midA - a) * 0.75) * (mid - 5 * s),
      Math.sin(a - (midA - a) * 0.75) * (mid - 5 * s),
      mx2, my2
    );
    ctx.stroke();
  }
  ctx.restore();
}

// Waves
function drawWaves(p) {
  const count = Math.round(p.waveCount);
  for (let i = 0; i < count; i++) {
    const phase = t * p.waveSpeed + i * (TAU / count);
    const progress = (phase % TAU) / TAU;
    const r = (55 + progress * 150) * s;
    const alpha = p.waveAlpha * Math.sin(progress * Math.PI) * (1 - progress * 0.3);

    ctx.beginPath();
    ctx.arc(0, 0, r, 0, TAU);
    ctx.strokeStyle = rgba(COL.saffron, alpha);
    ctx.lineWidth = (0.9 - progress * 0.5) * s;
    ctx.stroke();
  }
}

// Yantra
function drawYantra(p) {
  const alpha = p.yantraAlpha;
  if (alpha < 0.003) return;

  ctx.save();
  ctx.rotate(t * p.yantraRot);
  ctx.lineWidth = 0.45 * s;

  const layers = [
    { r: 42, up: true,  a: 0.45 },
    { r: 34, up: false, a: 0.35 },
    { r: 26, up: true,  a: 0.28 },
    { r: 18, up: false, a: 0.2 },
  ];

  for (const layer of layers) {
    const r = layer.r * s;
    ctx.globalAlpha = alpha * layer.a / 0.45;
    ctx.strokeStyle = rgba(COL.gold, layer.a);
    ctx.beginPath();
    for (let i = 0; i < 3; i++) {
      const a = (i / 3) * TAU + (layer.up ? -Math.PI/2 : Math.PI/2);
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  ctx.globalAlpha = alpha * 0.45;
  ctx.strokeStyle = rgba(COL.gold, 0.2);
  ctx.lineWidth = 0.35 * s;
  ctx.beginPath();
  for (let i = 0; i <= 6; i++) {
    const a = (i / 6) * TAU;
    const r = 10 * s;
    i === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.stroke();

  const bp = 0.8 + 0.2 * Math.sin(t * 2);
  ctx.globalAlpha = alpha;
  const bg = ctx.createRadialGradient(0, 0, 0, 0, 0, 5 * s);
  bg.addColorStop(0, rgba(COL.gold, 0.45 * bp));
  bg.addColorStop(1, rgba(COL.gold, 0));
  ctx.fillStyle = bg;
  ctx.fillRect(-5 * s, -5 * s, 10 * s, 10 * s);
  ctx.beginPath();
  ctx.arc(0, 0, 1.3 * s, 0, TAU);
  ctx.fillStyle = rgba(COL.gold, 0.6 * bp);
  ctx.fill();

  ctx.globalAlpha = 1;
  ctx.restore();
}

// Teardrops
function drawTeardrops(radius, count, rot, alpha) {
  if (alpha < 0.003) return;
  const r = radius * s;

  ctx.save();
  ctx.rotate(t * rot * 0.7);
  ctx.globalAlpha = alpha * 0.5;

  for (let i = 0; i < count; i++) {
    const a = (i / count) * TAU + TAU / (count * 2);
    ctx.save();
    ctx.rotate(a);
    const sz = 5 * s;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.bezierCurveTo(r + sz * 0.6, -sz * 0.45, r + sz * 1.6, -sz * 0.15, r + sz * 2, 0);
    ctx.bezierCurveTo(r + sz * 1.6, sz * 0.15, r + sz * 0.6, sz * 0.45, r, 0);
    ctx.fillStyle = rgba(COL.tealLt, 0.45);
    ctx.fill();
    ctx.restore();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// Solid ring
function drawSolidRing(radius, alpha, color) {
  if (alpha < 0.003) return;
  ctx.beginPath();
  ctx.arc(0, 0, radius * s, 0, TAU);
  ctx.strokeStyle = rgba(color, alpha);
  ctx.lineWidth = 0.3 * s;
  ctx.stroke();
}


// Main loop
function frame(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  t += dt;

  if (state === 'error') {
    errorTimer += dt;
    if (errorTimer > 2.5) setState('idle');
  }

  blend(dt);

  // Smooth amplitude toward target
  amp += (ampTarget - amp) * Math.min(1, dt * 12);

  // Amplitude modulation on top of blended params
  if (amp > 0.01) {
    const a = amp;
    cur.coreR += a * 8;
    cur.coreGlow += a * 0.3;
    cur.breathe += a * 0.03;
    cur.dotPulse += a * 0.3;
    cur.blobScale += a * 0.2;
    if (state === 'speaking') {
      cur.waveAlpha += a * 0.15;
      cur.waveSpeed += a * 0.8;
    }
    if (state === 'listening') {
      cur.ring1Alpha += a * 0.15;
      cur.ring2Alpha += a * 0.1;
      cur.yantraAlpha += a * 0.1;
    }
  }

  const breathe = 1
    + Math.sin(t * 1.1) * cur.breathe
    + Math.sin(t * 2.7 + 0.4) * cur.breathe2;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  drawVignette();

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(breathe, breathe);

  const et = cur.errorTint || 0;
  const cSaffron = tintCol(COL.saffron, et);
  const cTeal = tintCol(COL.teal, et);
  const cTealLt = tintCol(COL.tealLt, et);
  const cGold = tintCol(COL.gold, et);

  ctx.globalCompositeOperation = 'lighter';

  drawBlob(cur);
  drawTendrils(cur);

  drawWaves(cur);

  drawHalo(140, cur.ring3Rot, cur.ring3Alpha, cTeal, 0.5);
  drawDots(148, 16, cur.ring3Rot, cur.dotAlpha * 0.25, cur.dotPulse * 0.4, cTealLt);
  drawPetals(130, 12, cur.ring3Rot * 0.8, cur.petalAlpha, cTeal);
  drawTeardrops(130, 12, cur.ring3Rot * 0.8, cur.petalAlpha);
  drawConnectors(105, 138, 8, cur.ring2Rot, cur.connectAlpha);

  drawHalo(100, cur.ring2Rot, cur.ring2Alpha, cSaffron, 0.6);
  drawDots(108, 12, cur.ring2Rot, cur.dotAlpha * 0.4, cur.dotPulse * 0.6, cGold);

  drawPetals(90, 8, cur.ring1Rot * 0.6, cur.petalAlpha * 0.8, cSaffron);
  drawTeardrops(90, 8, cur.ring1Rot * 0.6, cur.petalAlpha * 0.5);
  drawConnectors(70, 98, 6, cur.ring1Rot, cur.connectAlpha * 0.7);

  drawHalo(65, cur.ring1Rot, cur.ring1Alpha, cSaffron, 0.7);
  drawDots(72, 8, cur.ring1Rot, cur.dotAlpha, cur.dotPulse, cGold);

  drawSolidRing(48, cur.ring1Alpha * 0.25, cSaffron);

  drawYantra(cur);

  ctx.globalCompositeOperation = 'source-over';
  drawCore(cur);

  ctx.restore();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// Mic test mode — click anywhere to start
let testMode = false;
canvas.style.cursor = 'pointer';
canvas.addEventListener('click', async () => {
  if (testMode) return;
  testMode = true;
  canvas.style.cursor = 'none';

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const audioCtx = new AudioContext();
  const src = audioCtx.createMediaStreamSource(stream);
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  analyser.smoothingTimeConstant = 0.4;
  src.connect(analyser);
  const buf = new Uint8Array(analyser.frequencyBinCount);

  let silenceTimer = 0;
  let speaking = false;
  const SILENCE_THRESHOLD = 0.08;
  const SPEECH_THRESHOLD = 0.12;

  function poll() {
    analyser.getByteFrequencyData(buf);
    let sum = 0;
    for (let i = 0; i < buf.length; i++) sum += buf[i];
    const rms = sum / (buf.length * 255);

    setAmplitude(rms * 3);

    if (state === 'idle' && rms > SPEECH_THRESHOLD) {
      setState('listening');
      speaking = true;
      silenceTimer = 0;
    } else if (state === 'listening') {
      if (rms < SILENCE_THRESHOLD) {
        silenceTimer += 1 / 60;
        if (silenceTimer > 0.8) {
          speaking = false;
          setState('thinking');
          setAmplitude(0);
          setTimeout(() => {
            setState('speaking');
            // Simulate speaking with pulsing amplitude
            let sp = 0;
            const spk = setInterval(() => {
              sp += 0.05;
              const fakeAmp = 0.3 + 0.3 * Math.sin(sp * 8) * Math.sin(sp * 3);
              setAmplitude(Math.max(0, fakeAmp));
              if (sp > 3) {
                clearInterval(spk);
                setAmplitude(0);
                setState('idle');
              }
            }, 33);
          }, 1500);
        }
      } else {
        silenceTimer = 0;
      }
    }

    requestAnimationFrame(poll);
  }
  poll();
}, { once: true });

// Health check
async function checkHealth() {
  try {
    const res = await fetch('/health', { signal: AbortSignal.timeout(5000) });
    if (!res.ok) throw new Error();
    const data = await res.json();
    healthDot.className = (data.status === 'ok' || data.status === 'degraded') ? 'green' : 'yellow';
  } catch { healthDot.className = 'red'; }
}
checkHealth();
setInterval(checkHealth, 30000);

// Poll state from voice pipeline
async function pollState() {
  try {
    const res = await fetch('/v1/state', { signal: AbortSignal.timeout(2000) });
    if (!res.ok) return;
    const data = await res.json();
    if (data.state && data.state !== state) setState(data.state);
  } catch {}
}
setInterval(pollState, 200);
</script>
